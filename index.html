<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krammz Lua</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0d47a1,#001f3f);
    color:white;
    text-align:center;
}

/* animasi */
.glow {
    font-size:30px;
    animation: glow 2s infinite alternate;
}
@keyframes glow {
    from {text-shadow:0 0 10px cyan;}
    to {text-shadow:0 0 30px cyan;}
}

.container {
    padding:20px;
}

button {
    padding:10px;
    margin:10px;
    border:none;
    border-radius:10px;
    background:#00bfff;
    color:white;
    cursor:pointer;
}

.box {
    background:rgba(255,255,255,0.1);
    margin:15px;
    padding:15px;
    border-radius:15px;
}

.file {
    background:rgba(0,0,0,0.4);
    padding:10px;
    margin:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="login" class="container">
    <h1 class="glow">Krammz Lua</h1>
    <p>Pilih Login</p>

    <button onclick="login('owner')">Login Owner</button>
    <button onclick="login('member')">Member Saluran</button>
</div>

<div id="password" class="container" style="display:none;">
    <h2>Masukkan Password</h2>
    <input type="password" id="pass">
    <br>
    <button onclick="checkPass()">Masuk</button>
</div>

<div id="owner" class="container" style="display:none;">
    <h1 class="glow">OWNER PANEL</h1>

    <input type="file" id="fileInput">
    <br>
    <button onclick="upload()">Upload File</button>

    <div id="ownerFiles"></div>
</div>

<div id="member" class="container" style="display:none;">
    <h1 class="glow">WELCOME MEMBER</h1>
    <p>Welcome Member Krammz Lua Yang Ganteng Baik Suka Cheat GTA 😈</p>

    <div class="box">
        Total Kunjungan: <span id="visit"></span>
    </div>

    <div class="box">
        Total Script: <span id="totalScript"></span>
    </div>

    <button onclick="join()">Join Saluran</button>

    <h2>List Script</h2>
    <div id="memberFiles"></div>
</div>

<script>
let role = "";

// login
function login(r){
    role = r;
    document.getElementById("login").style.display="none";
    document.getElementById("password").style.display="block";
}

// password
function checkPass(){
    let p = document.getElementById("pass").value;

    if(p === "krammzluacc"){
        document.getElementById("password").style.display="none";

        if(role === "owner"){
            document.getElementById("owner").style.display="block";
            loadOwner();
        } else {
            document.getElementById("member").style.display="block";
            loadMember();
        }
    } else {
        alert("Password salah!");
    }
}

// upload (owner)
function upload(){
    let input = document.getElementById("fileInput");
    if(input.files.length === 0) return alert("Pilih file!");

    let file = input.files[0];
    let data = JSON.parse(localStorage.getItem("files") || "[]");

    data.push(file.name);
    localStorage.setItem("files", JSON.stringify(data));

    loadOwner();
}

// load owner
function loadOwner(){
    let data = JSON.parse(localStorage.getItem("files") || "[]");
    let div = document.getElementById("ownerFiles");
    div.innerHTML="";

    data.forEach(f=>{
        div.innerHTML += `<div class="file">${f}</div>`;
    });
}

// load member
function loadMember(){
    let data = JSON.parse(localStorage.getItem("files") || "[]");

    let div = document.getElementById("memberFiles");
    div.innerHTML="";

    data.forEach(f=>{
        div.innerHTML += `<div class="file">${f}</div>`;
    });

    document.getElementById("totalScript").innerText = data.length;

    // visit counter
    let v = localStorage.getItem("visit") || 0;
    v++;
    localStorage.setItem("visit", v);
    document.getElementById("visit").innerText = v;
}

// join WA
function join(){
    window.location.href="https://whatsapp.com/channel/0029Vb1emh39Gv7QRTZwp02u";
}
</script>

</body>
</html>
