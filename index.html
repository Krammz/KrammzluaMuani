<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krammz Lua</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0a1f44, #0d47a1);
        color: white;
        text-align: center;
    }

    header {
        padding: 40px 20px;
    }

    /* Animasi teks */
    .title {
        font-size: 40px;
        font-weight: bold;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from {
            text-shadow: 0 0 10px #00bfff;
        }
        to {
            text-shadow: 0 0 30px #00e5ff, 0 0 60px #00e5ff;
        }
    }

    .container {
        background: rgba(255,255,255,0.05);
        margin: 20px;
        padding: 20px;
        border-radius: 15px;
    }

    input[type="file"] {
        margin: 15px 0;
    }

    button {
        padding: 10px 20px;
        background: #00bfff;
        border: none;
        border-radius: 10px;
        color: white;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background: #009acd;
    }

    .file-list {
        margin-top: 20px;
        text-align: left;
    }

    .file-item {
        background: rgba(0,0,0,0.3);
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 10px;
    }
</style>
</head>

<body>

<header>
    <div class="title">Krammz Lua</div>
    <p>Upload File Lua Kamu Disini</p>
</header>

<div class="container">
    <h2>Upload File (.lua)</h2>
    
    <input type="file" id="fileInput" accept=".lua">
    <br>
    <button onclick="uploadFile()">Upload</button>

    <div class="file-list" id="fileList"></div>
</div>

<script>
function uploadFile() {
    const input = document.getElementById("fileInput");
    const list = document.getElementById("fileList");

    if (input.files.length === 0) {
        alert("Pilih file dulu!");
        return;
    }

    const file = input.files[0];

    if (!file.name.endsWith(".lua")) {
        alert("Harus file .lua!");
        return;
    }

    const div = document.createElement("div");
    div.className = "file-item";
    div.innerHTML = `
        <strong>Nama:</strong> ${file.name} <br>
        <strong>Ukuran:</strong> ${(file.size / 1024).toFixed(2)} KB
    `;

    list.appendChild(div);

    input.value = "";
}
</script>

</body>
</html>
