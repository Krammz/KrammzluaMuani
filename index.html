<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Guysss</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0d47a1, #000);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

/* Container */
.container {
    animation: fadeIn 2s ease-in-out;
}

/* Animasi teks */
.title {
    font-size: 40px;
    font-weight: bold;
    animation: glow 2s infinite alternate;
}

.subtitle {
    font-size: 18px;
    margin-top: 10px;
    opacity: 0.8;
}

/* Tombol */
button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    background: #00bfff;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #009acd;
}

/* Animasi */
@keyframes glow {
    from { text-shadow: 0 0 10px #00e5ff; }
    to { text-shadow: 0 0 30px #00e5ff, 0 0 60px #00e5ff; }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
    <div class="title">Welcome Guysss 😎</div>
    <div class="subtitle">Selamat datang di website Krammz Lua</div>
    
    <button onclick="alert('Halo Bang 😎🔥')">Klik Disini</button>
</div>

</body>
</html>
