<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KrammzLua Scanner</title>
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            background: #0a0a0a;
        }

        /* SOFT RGB BACKGROUND - HITAM PINK */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, 
                #0a0a0a 0%,
                #1a0a14 15%,
                #2a0f1f 30%,
                #3a142a 45%,
                #2a0f1f 60%,
                #1a0a14 75%,
                #00bfff 90%,
                #1e90ff 100%);
            background-size: 400% 400%;
            animation: softPinkRGB 20s ease infinite;
            opacity: 0.6;
            z-index: -2;
        }

        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(2px);
            z-index: -1;
        }

        @keyframes softPinkRGB {
            0% { background-position: 0% 0%; }
            25% { background-position: 50% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 50% 50%; }
            100% { background-position: 0% 0%; }
        }

        /* SOFT PINK GLOW */
        @keyframes softPinkGlow {
            0% { border-color: #00bfff; box-shadow: 0 0 20px rgba(255, 20, 147, 0.2); }
            25% { border-color: #b81b6f; box-shadow: 0 0 20px rgba(184, 27, 111, 0.2); }
            50% { border-color: #8a1f5c; box-shadow: 0 0 20px rgba(138, 31, 92, 0.2); }
            75% { border-color: #b81b6f; box-shadow: 0 0 20px rgba(184, 27, 111, 0.2); }
            100% { border-color: #00bfff; box-shadow: 0 0 20px rgba(255, 20, 147, 0.2); }
        }

        @keyframes softPinkText {
            0% { color: #ff99cc; text-shadow: 0 0 10px rgba(255, 153, 204, 0.3); }
            25% { color: #87cefa; text-shadow: 0 0 10px rgba(255, 182, 193, 0.3); }
            50% { color: #1e90ff; text-shadow: 0 0 10px rgba(255, 105, 180, 0.3); }
            75% { color: #87cefa; text-shadow: 0 0 10px rgba(255, 182, 193, 0.3); }
            100% { color: #ff99cc; text-shadow: 0 0 10px rgba(255, 153, 204, 0.3); }
        }

        /* Discord Theme with Pink Accents */
        .container {
            max-width: 1000px;
            width: 100%;
            background: rgba(47, 49, 54, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 2px solid;
            animation: softPinkGlow 8s infinite;
            position: relative;
            z-index: 1;
        }

        /* Discord Header with Pink */
        .header {
            background: rgba(32, 34, 37, 0.9);
            backdrop-filter: blur(5px);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid;
            animation: softPinkGlow 8s infinite;
        }

        .header-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00bfff, #b81b6f);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.3);
        }

        .header-title {
            flex: 1;
        }

        .header-title h1 {
            color: white;
            font-size: 24px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #1e90ff, #00bfff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-title p {
            color: #87cefa;
            font-size: 14px;
        }

        .header-badge {
            background: linear-gradient(135deg, #00bfff, #b81b6f);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.3);
        }

        /* Main Content */
        .content {
            padding: 30px;
            background: rgba(47, 49, 54, 0.7);
            backdrop-filter: blur(5px);
        }

        /* Status Bar with Pink */
        .status-bar {
            background: rgba(32, 34, 37, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid;
            animation: softPinkGlow 8s infinite;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e90ff, #00bfff);
            animation: softPinkGlow 4s infinite;
        }

        .status-dot.warning {
            background: linear-gradient(135deg, #87cefa, #1e90ff);
        }

        .status-dot.danger {
            background: linear-gradient(135deg, #00bfff, #b81b6f);
        }

        .status-label {
            color: #87cefa;
            font-size: 12px;
            text-transform: uppercase;
        }

        .status-value {
            color: white;
            font-weight: 600;
            animation: softPinkText 8s infinite;
        }

        /* Upload Area - Pink Style */
        .upload-area {
            background: rgba(32, 34, 37, 0.7);
            backdrop-filter: blur(5px);
            border: 2px dashed;
            animation: softPinkGlow 8s infinite;
            border-radius: 4px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 25px;
        }

        .upload-area:hover {
            background: rgba(44, 47, 51, 0.8);
            border-style: solid;
            transform: scale(1.01);
        }

        .upload-area.dragover {
            border-style: solid;
            background: rgba(44, 47, 51, 0.8);
        }

        .upload-icon {
            font-size: 48px;
            animation: softPinkText 8s infinite;
            margin-bottom: 15px;
        }

        .upload-text {
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #87cefa;
            font-size: 12px;
        }

        /* Scan Button - Pink Gradient */
        .scan-btn {
            background: linear-gradient(135deg, #00bfff, #b81b6f);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 25px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.3);
        }

        .scan-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #1e90ff, #00bfff);
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.5);
        }

        .scan-btn:disabled {
            background: #4f545c;
            cursor: not-allowed;
            opacity: 0.5;
            box-shadow: none;
        }

        /* Progress - Pink Style */
        .progress-container {
            background: rgba(32, 34, 37, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 25px;
            display: none;
            border: 1px solid;
            animation: softPinkGlow 8s infinite;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            height: 8px;
            background: rgba(79, 84, 92, 0.5);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00bfff, #1e90ff, #87cefa);
            background-size: 200% 200%;
            animation: softPinkRGB 5s ease infinite;
            width: 0%;
            transition: width 0.3s;
            border-radius: 4px;
        }

        .progress-text {
            color: #87cefa;
            font-size: 14px;
            text-align: center;
            animation: softPinkText 8s infinite;
        }

        /* Results Section */
        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        /* Risk Cards with Pink */
        .risk-card {
            background: rgba(32, 34, 37, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid;
            border: 1px solid;
            animation: softPinkGlow 8s infinite;
        }

        .risk-card.critical {
            border-left-color: #00bfff;
        }

        .risk-card.high {
            border-left-color: #1e90ff;
        }

        .risk-card.medium {
            border-left-color: #87cefa;
        }

        .risk-card.low {
            border-left-color: #ff99cc;
        }

        .risk-card.safe {
            border-left-color: #3ba55d;
        }

        .risk-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .risk-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }

        .risk-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: linear-gradient(135deg, #00bfff, #b81b6f);
            color: white;
        }

        .badge-critical {
            background: linear-gradient(135deg, #00bfff, #b81b6f);
        }

        .badge-high {
            background: linear-gradient(135deg, #1e90ff, #00bfff);
        }

        .badge-medium {
            background: linear-gradient(135deg, #87cefa, #1e90ff);
        }

        .badge-low {
            background: #3ba55d;
        }

        .badge-safe {
            background: #3ba55d;
        }

        /* Webhook Section - Pink Critical */
        .webhook-section {
            background: rgba(44, 47, 51, 0.8);
            backdrop-filter: blur(5px);
            border: 2px solid;
            animation: softPinkGlow 8s infinite;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .webhook-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid;
            animation: softPinkGlow 8s infinite;
        }

        .webhook-icon {
            animation: softPinkText 8s infinite;
            font-size: 20px;
        }

        .webhook-title {
            background: linear-gradient(135deg, #00bfff, #1e90ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 16px;
            font-weight: 600;
        }

        .webhook-count {
            background: linear-gradient(135deg, #00bfff, #b81b6f);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: auto;
        }

        .webhook-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .webhook-item {
            background: rgba(32, 34, 37, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid;
            animation: softPinkGlow 8s infinite;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 8px;
            font-size: 12px;
            word-break: break-all;
            color: #87cefa;
            font-family: 'Consolas', monospace;
        }

        .webhook-item:hover {
            background: rgba(44, 47, 51, 0.9);
        }

        /* Pattern Cards with Pink */
        .pattern-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .pattern-card {
            background: rgba(32, 34, 37, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid;
            animation: softPinkGlow 8s infinite;
            border-radius: 4px;
            padding: 15px;
            transition: all 0.2s;
        }

        .pattern-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(255, 20, 147, 0.2);
        }

        .pattern-card.critical {
            border-left: 4px solid #00bfff;
        }

        .pattern-card.high {
            border-left: 4px solid #1e90ff;
        }

        .pattern-card.medium {
            border-left: 4px solid #87cefa;
        }

        .pattern-card.low {
            border-left: 4px solid #3ba55d;
        }

        .pattern-name {
            color: white;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .pattern-desc {
            color: #87cefa;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .pattern-type {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(255, 20, 147, 0.2);
            border-radius: 12px;
            font-size: 10px;
            color: #87cefa;
            border: 1px solid #00bfff;
        }

        /* Discord Buttons with Pink */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .discord-btn {
            flex: 1;
            background: rgba(79, 84, 92, 0.3);
            backdrop-filter: blur(5px);
            color: white;
            border: 1px solid;
            animation: softPinkGlow 8s infinite;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .discord-btn:hover {
            background: rgba(93, 98, 105, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.2);
        }

        .discord-btn.primary {
            background: linear-gradient(135deg, #00bfff, #b81b6f);
            border: none;
        }

        .discord-btn.primary:hover {
            background: linear-gradient(135deg, #1e90ff, #00bfff);
        }

        .discord-btn.danger {
            background: linear-gradient(135deg, #b81b6f, #8a1f5c);
            border: none;
        }

        .discord-btn.danger:hover {
            background: linear-gradient(135deg, #00bfff, #b81b6f);
        }

        .discord-btn.success {
            background: #3ba55d;
            border: none;
        }

        /* Modal - Pink Style */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(54, 57, 63, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(255, 20, 147, 0.2);
            border: 2px solid;
            animation: softPinkGlow 8s infinite;
        }

        .modal-header {
            background: rgba(32, 34, 37, 0.9);
            backdrop-filter: blur(5px);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid;
            animation: softPinkGlow 8s infinite;
        }

        .modal-header h2 {
            background: linear-gradient(135deg, #1e90ff, #00bfff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #87cefa;
            font-size: 24px;
            cursor: pointer;
        }

        .modal-close:hover {
            color: #00bfff;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            max-height: calc(80vh - 120px);
            color: #87cefa;
        }

        /* File List with Pink */
        .file-list {
            background: rgba(47, 49, 54, 0.5);
            backdrop-filter: blur(5px);
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid;
            animation: softPinkGlow 8s infinite;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid;
            animation: softPinkGlow 8s infinite;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-icon {
            animation: softPinkText 8s infinite;
        }

        .file-name {
            color: white;
        }

        .file-size {
            color: #87cefa;
            font-size: 12px;
        }

        .file-risk {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(255, 20, 147, 0.1);
            border: 1px solid #00bfff;
            color: #87cefa;
        }

        /* Scrollbar - Pink */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a121a;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #1e90ff, #00bfff, #b81b6f);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #87cefa, #1e90ff, #00bfff);
        }

        /* Footer Style */
        .footer-note {
            text-align: center;
            margin-top: 20px;
            color: #87cefa;
            font-size: 11px;
            animation: softPinkText 8s infinite;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .pattern-grid {
                grid-template-columns: 1fr;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .header {
                flex-direction: column;
                text-align: center;
            }
        }

            { pattern: 'discord.com/api/webhooks', type: 'webhook', risk: 'critical', desc: 'Discord Webhook URL' },
            { pattern: 'discordapp.com/api/webhooks', type: 'webhook', risk: 'critical', desc: 'Discord Webhook URL' },
            { pattern: 'ptb.discord.com/api/webhooks', type: 'webhook', risk: 'critical', desc: 'Discord PTB Webhook' },
            { pattern: 'canary.discord.com/api/webhooks', type: 'webhook', risk: 'critical', desc: 'Discord Canary Webhook' },
            
            // Webhook related functions
            { pattern: 'sendToDiscord', type: 'function', risk: 'high', desc: 'Discord Send Function' },
            { pattern: 'sendToWebhook', type: 'function', risk: 'high', desc: 'Webhook Send Function' },
            { pattern: 'requests.post.*webhook', type: 'http', risk: 'high', desc: 'HTTP POST to Webhook' },
            
            // Discord message formats
            { pattern: 'embeds', type: 'discord', risk: 'medium', desc: 'Discord Embed Format' },
            { pattern: '"content"', type: 'discord', risk: 'medium', desc: 'Discord Message Content' },
            { pattern: '"username"', type: 'discord', risk: 'medium', desc: 'Discord Webhook Username' },
            { pattern: '"avatar_url"', type: 'discord', risk: 'medium', desc: 'Discord Avatar URL' },
            
            // Common keylogger patterns
            { pattern: 'onSendDialogResponse', type: 'keylogger', risk: 'high', desc: 'SAMP Dialog Hook' },
            { pattern: 'inputtext', type: 'keylogger', risk: 'high', desc: 'Password Variable' },
            { pattern: 'sampGetPlayerNickname', type: 'samp', risk: 'medium', desc: 'SAMP Player Info' },
            { pattern: 'samp.events', type: 'samp', risk: 'medium', desc: 'SAMP Events Hook' }
        ];

        // Additional webhook patterns
        const WEBHOOK_REGEX = /https?:\/\/(?:discord|discordapp|ptb\.discord|canary\.discord)\.com\/api\/webhooks\/(\d+)\/([a-zA-Z0-9_-]+)/gi;

        let scannedFiles = [];
        let detectedWebhooks = [];
        let currentFiles = [];

        // DOM Elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const scanBtn = document.getElementById('scanBtn');
        const progress = document.getElementById('progress');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const results = document.getElementById('results');
        const fileList = document.getElementById('fileList');
        const webhookSection = document.getElementById('webhookSection');
        const webhookList = document.getElementById('webhookList');
        const webhookTotal = document.getElementById('webhookTotal');
        const patternGrid = document.getElementById('patternGrid');
        const scannedCount = document.getElementById('scannedCount');
        const webhookCount = document.getElementById('webhookCount');

        // Event Listeners
        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            currentFiles = [];
            for(let i = 0; i < files.length; i++) {
                if(files[i].name.match(/\.(lua|txt)$/i)) {
                    currentFiles.push(files[i]);
                }
            }
            
            if(currentFiles.length > 0) {
                scanBtn.disabled = false;
                uploadArea.querySelector('.upload-text').textContent = `${currentFiles.length} file(s) selected`;
                uploadArea.querySelector('.upload-hint').textContent = `Ready to scan for Discord webhooks`;
            }
        }

        function startScan() {
            if(currentFiles.length === 0) return;

            scannedFiles = [];
            detectedWebhooks = [];
            progress.classList.add('active');
            results.classList.remove('active');
            scanBtn.disabled = true;

            scanNextFile(0);
        }

        function scanNextFile(index) {
            if(index >= currentFiles.length) {
                finishScan();
                return;
            }

            const file = currentFiles[index];
            const reader = new FileReader();

            reader.onload = (e) => {
                const content = e.target.result;
                const result = analyzeFile(content, file.name, file.size);
                scannedFiles.push(result);

                const progressPercent = ((index + 1) / currentFiles.length) * 100;
                progressFill.style.width = progressPercent + '%';
                progressText.textContent = `Scanning ${file.name}... ${Math.round(progressPercent)}%`;

                setTimeout(() => scanNextFile(index + 1), 100);
            };

            reader.readAsText(file);
        }

        function analyzeFile(content, filename, size) {
            const findings = [];
            const webhooks = [];

            // Check for Discord webhooks
            let match;
            while ((match = WEBHOOK_REGEX.exec(content)) !== null) {
                webhooks.push({
                    url: match[0],
                    id: match[1],
                    token: match[2],
                    line: findLineNumber(content, match[0])
                });
            }

            // Check patterns
            DISCORD_PATTERNS.forEach(pattern => {
                if(content.toLowerCase().includes(pattern.pattern.toLowerCase())) {
                    findings.push({
                        ...pattern,
                        line: findLineNumber(content, pattern.pattern),
                        context: extractContext(content, pattern.pattern)
                    });
                }
            });

            // Add to global webhooks
            webhooks.forEach(w => {
                if(!detectedWebhooks.find(dw => dw.url === w.url)) {
                    detectedWebhooks.push(w);
                }
            });

            // Determine risk level
            let risk = 'safe';
            if(webhooks.length > 0) risk = 'critical';
            else if(findings.some(f => f.risk === 'high')) risk = 'high';
            else if(findings.some(f => f.risk === 'medium')) risk = 'medium';
            else if(findings.length > 0) risk = 'low';

            return {
                filename,
                size,
                risk,
                findings,
                webhooks,
                timestamp: new Date().toISOString()
            };
        }

        function findLineNumber(content, pattern) {
            const lines = content.split('\n');
            for(let i = 0; i < lines.length; i++) {
                if(lines[i].includes(pattern)) {
                    return i + 1;
                }
            }
            return -1;
        }

        function extractContext(content, pattern, contextSize = 30) {
            const index = content.indexOf(pattern);
            if(index === -1) return '';
            
            const start = Math.max(0, index - contextSize);
            const end = Math.min(content.length, index + pattern.length + contextSize);
            return content.substring(start, end).replace(/\n/g, ' ');
        }

        function finishScan() {
            progress.classList.remove('active');
            results.classList.add('active');

            // Update counts
            scannedCount.textContent = scannedFiles.length;
            webhookCount.textContent = detectedWebhooks.length;

            // Display file list
            displayFileList();

            // Display webhooks
            if(detectedWebhooks.length > 0) {
                webhookSection.style.display = 'block';
                webhookTotal.textContent = detectedWebhooks.length;
                webhookList.innerHTML = '';
                
                detectedWebhooks.forEach(webhook => {
                    const item = document.createElement('div');
                    item.className = 'webhook-item';
                    item.innerHTML = `
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <span style="color: #ff69b4;">🔴 DISCORD WEBHOOK</span>
                            <span style="color: #ffb6c1; font-size: 10px;">ID: ${webhook.id}</span>
                        </div>
                        <div>${webhook.url}</div>
                        <div style="color: #ffb6c1; font-size: 10px; margin-top: 5px;">
                            Token: ${webhook.token.substring(0, 10)}...${webhook.token.substring(webhook.token.length - 5)}
                        </div>
                    `;
                    webhookList.appendChild(item);
                });
            } else {
                webhookSection.style.display = 'none';
            }

            // Display patterns
            displayPatterns();
        }

        function displayFileList() {
            fileList.innerHTML = '';
            
            scannedFiles.forEach(file => {
                const item = document.createElement('div');
                item.className = 'file-item';
                
                const riskColor = {
                    critical: '#ff1493',
                    high: '#ff69b4',
                    medium: '#ffb6c1',
                    low: '#ff99cc',
                    safe: '#3ba55d'
                }[file.risk];
                
                item.innerHTML = `
                    <div class="file-info">
                        <span class="file-icon">📄</span>
                        <div>
                            <div class="file-name">${file.filename}</div>
                            <div class="file-size">${(file.size / 1024).toFixed(2)} KB</div>
                        </div>
                    </div>
                    <div class="file-risk" style="color: ${riskColor}; border-color: ${riskColor}">
                        ${file.risk.toUpperCase()} (${file.webhooks.length} webhooks)
                    </div>
                `;
                
                fileList.appendChild(item);
            });
        }

        function displayPatterns() {
            patternGrid.innerHTML = '';

            // Count pattern occurrences
            const patternCount = {};
            scannedFiles.forEach(file => {
                file.findings.forEach(finding => {
                    const key = finding.pattern;
                    if(!patternCount[key]) {
                        patternCount[key] = {
                            ...finding,
                            count: 1,
                            files: [file.filename]
                        };
                    } else {
                        patternCount[key].count++;
                        if(!patternCount[key].files.includes(file.filename)) {
                            patternCount[key].files.push(file.filename);
                        }
                    }
                });
            });

            // Display patterns
            Object.values(patternCount).forEach(pattern => {
                const card = document.createElement('div');
                card.className = `pattern-card ${pattern.risk}`;
                card.innerHTML = `
                    <div class="pattern-name">${pattern.desc}</div>
                    <div class="pattern-desc">${pattern.pattern}</div>
                    <div style="display: flex; gap: 5px; margin-bottom: 8px;">
                        <span class="pattern-type">${pattern.type}</span>
                        <span class="pattern-type" style="border-color: ${pattern.risk === 'critical' ? '#ff1493' : '#ffb6c1'}">
                            ${pattern.risk}
                        </span>
                    </div>
                    <div style="color: #ffb6c1; font-size: 11px;">
                        Found in ${pattern.count} file(s)
                    </div>
                `;
                patternGrid.appendChild(card);
            });
        }

        function copyWebhooks() {
            if(detectedWebhooks.length === 0) return;
            
            const text = detectedWebhooks.map(w => w.url).join('\n');
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Webhooks copied to clipboard!');
            });
        }

        function downloadReport() {
            const report = {
                scanTime: new Date().toISOString(),
                totalFiles: scannedFiles.length,
                webhooksDetected: detectedWebhooks,
                files: scannedFiles,
                summary: {
                    criticalFiles: scannedFiles.filter(f => f.risk === 'critical').length,
                    totalWebhooks: detectedWebhooks.length,
                    patternsFound: scannedFiles.reduce((a, f) => a + f.findings.length, 0)
                }
            };

            const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `discord_scan_${Date.now()}.json`;
            a.click();
        }

        function showDetails(fileIndex) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            const file = scannedFiles[fileIndex];
            
            modalBody.innerHTML = `
                <div style="margin-bottom: 20px;">
                    <h3 style="color: white; margin-bottom: 10px;">${file.filename}</h3>
                    <div style="background: rgba(32,34,37,0.7); padding: 10px; border-radius: 4px; border: 1px solid #ff1493;">
                        <p><strong style="color: #ff69b4;">Risk:</strong> <span style="color: ${file.risk === 'critical' ? '#ff1493' : '#ffb6c1'}">${file.risk}</span></p>
                        <p><strong style="color: #ff69b4;">Size:</strong> <span style="color: #ffb6c1;">${(file.size / 1024).toFixed(2)} KB</span></p>
                        <p><strong style="color: #ff69b4;">Webhooks:</strong> <span style="color: #ffb6c1;">${file.webhooks.length}</span></p>
                        <p><strong style="color: #ff69b4;">Patterns:</strong> <span style="color: #ffb6c1;">${file.findings.length}</span></p>
                    </div>
                </div>
                
                ${file.webhooks.length > 0 ? `
                <div style="margin-bottom: 20px;">
                    <h4 style="color: #ff1493; margin-bottom: 10px;">🔴 Webhooks</h4>
                    ${file.webhooks.map(w => `
                        <div style="background: rgba(32,34,37,0.7); padding: 10px; border-radius: 4px; margin-bottom: 5px; border: 1px solid #ff1493;">
                            <div style="color: #ff69b4;">${w.url}</div>
                            <div style="color: #ffb6c1; font-size: 11px;">Line: ${w.line}</div>
                        </div>
                    `).join('')}
                </div>
                ` : ''}
                
                ${file.findings.length > 0 ? `
                <div>
                    <h4 style="color: #ff69b4; margin-bottom: 10px;">📋 Patterns</h4>
                    ${file.findings.map(f => `
                        <div style="background: rgba(32,34,37,0.7); padding: 10px; border-radius: 4px; margin-bottom: 5px; border: 1px solid #ff1493;">
                            <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                                <span style="color: ${f.risk === 'critical' ? '#ff1493' : '#ff69b4'}">${f.desc}</span>
                                <span style="color: #ffb6c1;">(${f.type})</span>
                            </div>
                            <div style="color: #ffb6c1; font-size: 11px;">Line: ${f.line}</div>
                            <div style="color: #ffb6c1; font-size: 11px; background: #2c2f33; padding: 5px; border-radius: 2px; margin-top: 5px;">
                                ${f.context}
                            </div>
                        </div>
                    `).join('')}
                </div>
                ` : ''}
            `;
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
    </script>
<script>
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];
for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
    ctx.fillStyle = "rgba(255,255,255,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#00bfff";
    ctx.font = fontSize + "px monospace";

    for(let i=0;i<drops.length;i++){
        const text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random()>0.975)
            drops[i]=0;

        drops[i]++;
    }
}

setInterval(draw,33);
</script></body>
</html>
