<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Keylogger - © Caramell • Pink RGB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            background: #0a0a0a;
        }

        /* SOFT RGB BACKGROUND - HITAM PINK */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, 
                #0a0a0a 0%,
                #1a0a14 15%,
                #2a0f1f 30%,
                #3a142a 45%,
                #2a0f1f 60%,
                #1a0a14 75%,
                #ff1493 90%,
                #ff69b4 100%);
            background-size: 400% 400%;
            animation: softPinkRGB 20s ease infinite;
            opacity: 0.6;
            z-index: -2;
        }

        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(2px);
            z-index: -1;
        }

        @keyframes softPinkRGB {
            0% { background-position: 0% 0%; }
            25% { background-position: 50% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 50% 50%; }
            100% { background-position: 0% 0%; }
        }

        /* SOFT PINK GLOW */
        @keyframes softPinkGlow {
            0% { border-color: #ff1493; box-shadow: 0 0 20px rgba(255, 20, 147, 0.2); }
            25% { border-color: #b81b6f; box-shadow: 0 0 20px rgba(184, 27, 111, 0.2); }
            50% { border-color: #8a1f5c; box-shadow: 0 0 20px rgba(138, 31, 92, 0.2); }
            75% { border-color: #b81b6f; box-shadow: 0 0 20px rgba(184, 27, 111, 0.2); }
            100% { border-color: #ff1493; box-shadow: 0 0 20px rgba(255, 20, 147, 0.2); }
        }

        @keyframes softPinkText {
            0% { color: #ff99cc; text-shadow: 0 0 10px rgba(255, 153, 204, 0.3); }
            25% { color: #ffb6c1; text-shadow: 0 0 10px rgba(255, 182, 193, 0.3); }
            50% { color: #ff69b4; text-shadow: 0 0 10px rgba(255, 105, 180, 0.3); }
            75% { color: #ffb6c1; text-shadow: 0 0 10px rgba(255, 182, 193, 0.3); }
            100% { color: #ff99cc; text-shadow: 0 0 10px rgba(255, 153, 204, 0.3); }
        }

        /* Discord Theme with Pink Accents */
        .container {
            max-width: 1000px;
            width: 100%;
            background: rgba(47, 49, 54, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 2px solid;
            animation: softPinkGlow 8s infinite;
            position: relative;
            z-index: 1;
        }

        /* Discord Header with Pink */
        .header {
            background: rgba(32, 34, 37, 0.9);
            backdrop-filter: blur(5px);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid;
            animation: softPinkGlow 8s infinite;
        }

        .header-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff1493, #b81b6f);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.3);
        }

        .header-title {
            flex: 1;
        }

        .header-title h1 {
            color: white;
            font-size: 24px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-title p {
            color: #ffb6c1;
            font-size: 14px;
        }

        .header-badge {
            background: linear-gradient(135deg, #ff1493, #b81b6f);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.3);
        }

        /* Main Content */
        .content {
            padding: 30px;
            background: rgba(47, 49, 54, 0.7);
            backdrop-filter: blur(5px);
        }

        /* Status Bar with Pink */
        .status-bar {
            background: rgba(32, 34, 37, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid;
            animation: softPinkGlow 8s infinite;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            animation: softPinkGlow 4s infinite;
        }

        .status-dot.warning {
            background: linear-gradient(135deg, #ffb6c1, #ff69b4);
        }

        .status-dot.danger {
            background: linear-gradient(135deg, #ff1493, #b81b6f);
        }

        .status-label {
            color: #ffb6c1;
            font-size: 12px;
            text-transform: uppercase;
        }

        .status-value {
            color: white;
            font-weight: 600;
            animation: softPinkText 8s infinite;
        }

        /* Upload Area - Pink Style */
        .upload-area {
            background: rgba(32, 34, 37, 0.7);
            backdrop-filter: blur(5px);
            border: 2px dashed;
            animation: softPinkGlow 8s infinite;
            border-radius: 4px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 25px;
        }

        .upload-area:hover {
            background: rgba(44, 47, 51, 0.8);
            border-style: solid;
            transform: scale(1.01);
        }

        .upload-area.dragover {
            border-style: solid;
            background: rgba(44, 47, 51, 0.8);
        }

        .upload-icon {
            font-size: 48px;
            animation: softPinkText 8s infinite;
            margin-bottom: 15px;
        }

        .upload-text {
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #ffb6c1;
            font-size: 12px;
        }

        /* Scan Button - Pink Gradient */
        .scan-btn {
            background: linear-gradient(135deg, #ff1493, #b81b6f);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 25px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.3);
        }

        .scan-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.5);
        }

        .scan-btn:disabled {
            background: #4f545c;
            cursor: not-allowed;
            opacity: 0.5;
            box-shadow: none;
        }

        /* Progress - Pink Style */
        .progress-container {
            background: rgba(32, 34, 37, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 25px;
            display: none;
            border: 1px solid;
            animation: softPinkGlow 8s infinite;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            height: 8px;
            background: rgba(79, 84, 92, 0.5);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff1493, #ff69b4, #ffb6c1);
            background-size: 200% 200%;
            animation: softPinkRGB 5s ease infinite;
            width: 0%;
            transition: width 0.3s;
            border-radius: 4px;
        }

        .progress-text {
            color: #ffb6c1;
            font-size: 14px;
            text-align: center;
            animation: softPinkText 8s infinite;
        }

        /* Results Section */
        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        /* Risk Cards with Pink */
        .risk-card {
            background: rgba(32, 34, 37, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid;
            border: 1px solid;
            animation: softPinkGlow 8s infinite;
        }

        .risk-card.critical {
            border-left-color: #ff1493;
        }

        .risk-card.high {
            border-left-color: #ff69b4;
        }

        .risk-card.medium {
            border-left-color: #ffb6c1;
        }

        .risk-card.low {
            border-left-color: #ff99cc;
        }

        .risk-card.safe {
            border-left-color: #3ba55d;
        }

        .risk-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .risk-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }

        .risk-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: linear-gradient(135deg, #ff1493, #b81b6f);
            color: white;
        }

        .badge-critical {
            background: linear-gradient(135deg, #ff1493, #b81b6f);
        }

        .badge-high {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
        }

        .badge-medium {
            background: linear-gradient(135deg, #ffb6c1, #ff69b4);
        }

        .badge-low {
            background: #3ba55d;
        }

        .badge-safe {
            background: #3ba55d;
        }

        /* Webhook Section - Pink Critical */
        .webhook-section {
            background: rgba(44, 47, 51, 0.8);
            backdrop-filter: blur(5px);
            border: 2px solid;
            animation: softPinkGlow 8s infinite;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .webhook-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid;
            animation: softPinkGlow 8s infinite;
        }

        .webhook-icon {
            animation: softPinkText 8s infinite;
            font-size: 20px;
        }

        .webhook-title {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 16px;
            font-weight: 600;
        }

        .webhook-count {
            background: linear-gradient(135deg, #ff1493, #b81b6f);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: auto;
        }

        .webhook-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .webhook-item {
            background: rgba(32, 34, 37, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid;
            animation: softPinkGlow 8s infinite;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 8px;
            font-size: 12px;
            word-break: break-all;
            color: #ffb6c1;
            font-family: 'Consolas', monospace;
        }

        .webhook-item:hover {
            background: rgba(44, 47, 51, 0.9);
        }

        /* Pattern Cards with Pink */
        .pattern-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .pattern-card {
            background: rgba(32, 34, 37, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid;
            animation: softPinkGlow 8s infinite;
            border-radius: 4px;
            padding: 15px;
            transition: all 0.2s;
        }

        .pattern-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(255, 20, 147, 0.2);
        }

        .pattern-card.critical {
            border-left: 4px solid #ff1493;
        }

        .pattern-card.high {
            border-left: 4px solid #ff69b4;
        }

        .pattern-card.medium {
            border-left: 4px solid #ffb6c1;
        }

        .pattern-card.low {
            border-left: 4px solid #3ba55d;
        }

        .pattern-name {
            color: white;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .pattern-desc {
            color: #ffb6c1;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .pattern-type {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(255, 20, 147, 0.2);
            border-radius: 12px;
            font-size: 10px;
            color: #ffb6c1;
            border: 1px solid #ff1493;
        }

        /* Discord Buttons with Pink */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .discord-btn {
            flex: 1;
            background: rgba(79, 84, 92, 0.3);
            backdrop-filter: blur(5px);
            color: white;
            border: 1px solid;
            animation: softPinkGlow 8s infinite;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .discord-btn:hover {
            background: rgba(93, 98, 105, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.2);
        }

        .discord-btn.primary {
            background: linear-gradient(135deg, #ff1493, #b81b6f);
            border: none;
        }

        .discord-btn.primary:hover {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
        }

        .discord-btn.danger {
            background: linear-gradient(135deg, #b81b6f, #8a1f5c);
            border: none;
        }

        .discord-btn.danger:hover {
            background: linear-gradient(135deg, #ff1493, #b81b6f);
        }

        .discord-btn.success {
            background: #3ba55d;
            border: none;
        }

        /* Modal - Pink Style */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(54, 57, 63, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(255, 20, 147, 0.2);
            border: 2px solid;
            animation: softPinkGlow 8s infinite;
        }

        .modal-header {
            background: rgba(32, 34, 37, 0.9);
            backdrop-filter: blur(5px);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid;
            animation: softPinkGlow 8s infinite;
        }

        .modal-header h2 {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #ffb6c1;
            font-size: 24px;
            cursor: pointer;
        }

        .modal-close:hover {
            color: #ff1493;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            max-height: calc(80vh - 120px);
            color: #ffb6c1;
        }

        /* File List with Pink */
        .file-list {
            background: rgba(47, 49, 54, 0.5);
            backdrop-filter: blur(5px);
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid;
            animation: softPinkGlow 8s infinite;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid;
            animation: softPinkGlow 8s infinite;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-icon {
            animation: softPinkText 8s infinite;
        }

        .file-name {
            color: white;
        }

        .file-size {
            color: #ffb6c1;
            font-size: 12px;
        }

        .file-risk {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(255, 20, 147, 0.1);
            border: 1px solid #ff1493;
            color: #ffb6c1;
        }

        /* Scrollbar - Pink */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a121a;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ff69b4, #ff1493, #b81b6f);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #ffb6c1, #ff69b4, #ff1493);
        }

        /* Footer Style */
        .footer-note {
            text-align: center;
            margin-top: 20px;
            color: #ffb6c1;
            font-size
